<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон для Apple Touch Icon -->
  <rect width="180" height="180" rx="40" fill="#FFF8F0"/>
  
  <!-- Декоративный градиент -->
  <rect width="180" height="180" rx="40" fill="url(#gradient)" opacity="0.1"/>
  
  <!-- Большая звезда -->
  <g filter="url(#shadow)">
    <path d="M90 40 L105 75 L142 75 L113 97 L125 132 L90 108 L55 132 L67 97 L38 75 L75 75 Z" fill="#D4AF37"/>
  </g>
  
  <!-- Центральный блик -->
  <circle cx="90" cy="78" r="12" fill="#F5E6E8" opacity="0.8"/>
  
  <!-- Маленькие блики -->
  <circle cx="90" cy="48" r="4" fill="#FFF8F0"/>
  <circle cx="106" cy="72" r="4" fill="#FFF8F0"/>
  <circle cx="74" cy="72" r="4" fill="#FFF8F0"/>
  
  <!-- Дополнительные декоративные элементы -->
  <circle cx="90" cy="140" r="3" fill="#D4AF37" opacity="0.3"/>
  <circle cx="50" cy="50" r="2" fill="#D4AF37" opacity="0.3"/>
  <circle cx="130" cy="50" r="2" fill="#D4AF37" opacity="0.3"/>
  
  <defs>
    <!-- Градиент -->
    <linearGradient id="gradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5E6E8"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    
    <!-- Тень -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
