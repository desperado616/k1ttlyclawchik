<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="64" height="64" rx="12" fill="#FFF8F0"/>
  
  <!-- Внешнее свечение звезды -->
  <g filter="url(#glow)">
    <path d="M32 12 L37.5 25 L51 25 L40.5 33.5 L44.5 46.5 L32 38 L19.5 46.5 L23.5 33.5 L13 25 L26.5 25 Z" fill="#E8C547" opacity="0.3"/>
  </g>
  
  <!-- Основная звезда -->
  <path d="M32 12 L37.5 25 L51 25 L40.5 33.5 L44.5 46.5 L32 38 L19.5 46.5 L23.5 33.5 L13 25 L26.5 25 Z" fill="#D4AF37"/>
  
  <!-- Центральный блик -->
  <circle cx="32" cy="28" r="4" fill="#F5E6E8" opacity="0.8"/>
  
  <!-- Маленькие блики на лучах -->
  <circle cx="32" cy="16" r="1.5" fill="#FFF8F0"/>
  <circle cx="38" cy="24" r="1.5" fill="#FFF8F0"/>
  <circle cx="26" cy="24" r="1.5" fill="#FFF8F0"/>
  
  <!-- Фильтр свечения -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
